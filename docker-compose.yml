services:
  backend:
    build:
      context: ./backend
    environment:
      UPLOAD_DIR: /data/uploads
      OUTPUT_DIR: /data/outputs
      DATABASE_URL: /data/db.sqlite3
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-xlsx,xls,csv}
      SECRET_KEY: ${SECRET_KEY:-change-me-run-cp-.env.example-.env}
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-24}
    volumes:
      - ./runtime/db:/data
      - ./runtime/uploads:/data/uploads
      - ./runtime/outputs:/data/outputs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        API_BASE_URL: http://backend:8000
    environment:
      API_BASE_URL: http://backend:8000
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${ERP_FORMATTER_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
